apiVersion: v1
kind: Namespace
metadata:
  name: glauco
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: glauco-app
  namespace: glauco
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: glauco-app-config
  namespace: glauco
data:
  OLLAMA_HOST: "http://ollama.glauco.svc.cluster.local:11434"
  OLLAMA_MODEL: "gemma4:e4b"
  GLAUCO_USE_HOST_DISPLAY: "0"
  JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75 -Dfile.encoding=UTF-8 -Djava.io.tmpdir=/app/tmp -Dorg.eclipse.swt.browser.DefaultType=webkit"
  SWT_GTK3: "1"
  DISPLAY: ":99"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glauco-app
  namespace: glauco
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: glauco-app
  template:
    metadata:
      labels:
        app: glauco-app
    spec:
      serviceAccountName: glauco-app
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: glauco-app
          image: ghcr.io/YOUR_ORG/glauco/glauco-app:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: glauco-app-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-tmp
              mountPath: /app/tmp
            - name: home
              mountPath: /home/glauco
            - name: public
              mountPath: /app/public
      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-tmp
          emptyDir: {}
        - name: home
          emptyDir: {}
        - name: public
          emptyDir: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: glauco-app
  namespace: glauco
spec:
  podSelector:
    matchLabels:
      app: glauco-app
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: glauco
      ports:
        - protocol: TCP
          port: 11434
