<!DOCTYPE html>
<html theme="g100">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/node_modules/@carbon/styles/css/styles.css">
    <script type="module" src="/carbon.js"></script>
    <style>
  cds-*:not(:defined) {
    visibility: hidden;
  }
</style>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
    </style>
  </head>
  <body class="cds-theme-zone-g100">
    <ui_shell><div style="
						display: grid;
						grid-template-columns: 280px 1fr;
						grid-template-rows: auto 1fr;
						height: 100vh;
					"><cds-header style="
							grid-column: 1 / span 2;
							grid-row: 1;
							z-index: 10;
						"><cds-header-name>Image Viewer</cds-header-name><cds-button onclick="event.preventDefault(); event.stopPropagation(); callback_5524(this.value); return false;" kind="primary">Selecionar pasta</cds-button></cds-header><cds-side-nav expanded style="
							grid-column: 1;
							grid-row: 2;
							position: relative !important;
							height: 100%;
						"><cds-side-nav-items><div data-bind="images"></div></cds-side-nav-items></cds-side-nav><content style="
							grid-column: 2;
							grid-row: 2;
							overflow: auto;
						"><div style="
								width: 100%;
								max-width: 1200px;
								height: 100%;
								display: flex;
								flex-direction: column;
								align-items: center;
								justify-content: center;
								background: var(--cds-layer);
								border-radius: 12px;
								padding: 1.5rem;
								box-shadow: 0 8px 24px rgba(0,0,0,0.2);
							"><div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;" data-bind="selected"><div style="color: #aaa; font-size: 1.2rem;">Selecione uma imagem</div></div></div></content></div></ui_shell>
  </body>
</html>
